<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DarziAtDoor | The Tailored Editorial</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-variant": "#e5e2dc",
              "on-secondary": "#ffffff",
              "outline": "#75777d",
              "background": "#fcf9f3",
              "surface-container": "#f0eee8",
              "secondary-container": "#adedd3",
              "surface": "#fcf9f3",
              "surface-container-lowest": "#ffffff",
              "secondary": "#2b6954",
              "primary-container": "#1b263b",
              "surface-container-low": "#f6f3ed",
              "primary": "#051125",
              "tertiary": "#190f00",
              "outline-variant": "#c5c6cd",
              "on-surface-variant": "#45474d",
              "on-background": "#1c1c18",
              "on-surface": "#1c1c18"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.5rem", "xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
